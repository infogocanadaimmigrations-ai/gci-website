<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Golden-hour journey illustration in warm tones">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3c1216"/>
      <stop offset="0.42" stop-color="#7c2c20"/>
      <stop offset="0.7" stop-color="#c46e2f"/>
      <stop offset="0.88" stop-color="#e7af5b"/>
      <stop offset="1" stop-color="#f4d79f"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.72" cy="0.40" r="0.42">
      <stop offset="0" stop-color="#ffe9b0" stop-opacity="0.95"/>
      <stop offset="0.42" stop-color="#f7c468" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#f7c468" stop-opacity="0"/>
    </radialGradient>
    <filter id="haze" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="7"/></filter>
  </defs>

  <rect width="1600" height="700" fill="url(#sky)"/>
  <rect width="1600" height="700" fill="url(#sun)"/>
  <circle cx="1152" cy="282" r="60" fill="#ffe9b3" opacity="0.92"/>

  <!-- far ridge: hazy, light = atmospheric depth -->
  <path d="M0,472 C300,422 520,462 800,442 C1080,422 1320,472 1600,448 L1600,700 L0,700 Z" fill="#c08274" opacity="0.40" filter="url(#haze)"/>

  <!-- mid ridge -->
  <path d="M0,522 C260,482 480,516 760,502 C1040,488 1340,526 1600,508 L1600,700 L0,700 Z" fill="#8a3f33" opacity="0.9"/>

  <!-- skyline silhouette on the horizon -->
  <g fill="#6c2a24" opacity="0.92">
    <rect x="690" y="470" width="22" height="40"/>
    <rect x="716" y="452" width="26" height="58"/>
    <rect x="746" y="480" width="17" height="30"/>
    <rect x="770" y="434" width="13" height="76"/>
    <rect x="775" y="404" width="3" height="32"/>
    <rect x="792" y="466" width="24" height="44"/>
    <rect x="820" y="478" width="19" height="32"/>
    <rect x="843" y="450" width="28" height="60"/>
    <rect x="875" y="472" width="16" height="38"/>
    <rect x="895" y="462" width="22" height="48"/>
  </g>

  <!-- near hill -->
  <path d="M0,582 C320,547 560,587 880,567 C1180,550 1380,592 1600,577 L1600,700 L0,700 Z" fill="#5a201e"/>
  <!-- foreground -->
  <path d="M0,652 C400,627 800,657 1200,642 C1380,635 1500,652 1600,647 L1600,700 L0,700 Z" fill="#3a1413"/>

  <!-- flight path -->
  <path d="M120,612 Q700,300 1250,246" fill="none" stroke="#f0c06a" stroke-width="2.6" stroke-dasharray="2 13" stroke-linecap="round" opacity="0.9"/>
  <circle cx="120" cy="612" r="5.5" fill="#f0c06a"/>
  <g transform="translate(1250,246) rotate(-20)"><path d="M0,0 L-28,10 L-19,0 L-28,-10 Z" fill="#f6dca6"/></g>
</svg>
